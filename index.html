<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahafa - Le Van Culinaire Collaboratif</title>
    <link rel="icon" type="image/png" href="favicon.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&family=Playfair+Display:ital,wght@0,500;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        /* CSS : Style Japonais Traditionnel & Épuré */
        :root {
            --primary: #8B4513;        /* Brun Palissandre */
            --primary-light: #A0522D;  /* Terre cuite */
            --accent: #E6C280;         /* Or pâle / Paille */
            --text-light: #f7f4eb;     /* Texte clair sur fond sombre */
            --text-dark: #2c1d11;      /* Texte sombre pour l'intérieur des cartes */
            --bg-card: rgba(255, 255, 255, 0.97);
            --radius: 8px;             /* Arrondi moderne et élégant */
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.7)), 
                              url('https://images.unsplash.com/photo-1618220179428-22790b461013?q=80&w=1200&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-light);
            margin: 0;
            padding: 16px;
            -webkit-font-smoothing: antialiased;
        }

        @media (min-width: 480px) {
            body { padding: 30px 20px; }
        }

        header {
            text-align: center;
            padding: 40px 10px;
            max-width: 800px;
            margin: 0 auto;
        }

        @media (min-width: 768px) {
            header { padding: 60px 20px 40px 20px; }
        }

        .logo-container {
            display: inline-block;
            position: relative;
            margin-bottom: 20px;
            padding: 12px 30px;
        }
        @media (min-width: 480px) {
            .logo-container { padding: 12px 50px; }
        }

        .logo-container::before, .logo-container::after {
            content: "";
            position: absolute;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent) 50%, transparent);
        }
        .logo-container::before { top: 0; }
        .logo-container::after { bottom: 0; }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.4rem;
            margin: 0;
            color: #ffffff;
            letter-spacing: 8px;
            font-weight: 500;
            text-transform: uppercase;
            position: relative;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (min-width: 480px) {
            header h1 { font-size: 3.4rem; letter-spacing: 12px; }
        }
        @media (min-width: 768px) {
            header h1 { font-size: 4.2rem; letter-spacing: 16px; }
        }

        .logo-dot {
            position: absolute;
            width: 35px;
            height: 35px;
            background-color: #bc1a1a;
            border-radius: 50%;
            z-index: -1;
            transform: translateX(-2px);
            box-shadow: 0 0 20px rgba(188, 26, 26, 0.6);
        }
        @media (min-width: 480px) {
            .logo-dot { width: 50px; height: 50px; transform: translateX(-4px); }
        }

        header p {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.1rem;
            letter-spacing: 1.5px;
            color: var(--accent);
            margin-top: 15px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
        }

        .main-container {
            max-width: 1100px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        @media (min-width: 768px) {
            .main-container {
                grid-template-columns: 340px 1fr;
                gap: 40px;
            }
        }

        .comptoir {
            background: var(--bg-card);
            color: var(--text-dark);
            padding: 25px;
            border-radius: var(--radius);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            border-top: 5px solid var(--primary); 
            height: fit-content;
        }

        .comptoir h2 {
            font-family: 'Playfair Display', serif;
            margin-top: 0;
            color: var(--primary);
            font-size: 1.4rem;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            padding-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 0.85rem;
            color: #4a3319;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ccd0d4;
            border-radius: 6px;
            background-color: #fff;
            box-sizing: border-box;
            font-size: 15px;
            color: var(--text-dark);
            font-family: inherit;
            transition: var(--transition);
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(160, 82, 45, 0.15);
        }

        textarea {
            resize: vertical;
            height: 110px;
        }

        button {
            width: 100%;
            background-color: #222;
            color: white;
            border: 1px solid #222;
            padding: 14px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: var(--transition);
        }

        button:hover, button:active {
            background-color: var(--primary);
            border-color: var(--primary);
            transform: translateY(-1px);
            box-shadow: 0 5px 12px rgba(139, 69, 19, 0.2);
        }

        .table-commune h2 {
            font-family: 'Playfair Display', serif;
            color: var(--accent);
            font-size: 1.6rem;
            margin-top: 0;
            margin-bottom: 20px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            letter-spacing: 0.5px;
        }

        .grille-plats {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 640px) {
            .grille-plats {
                grid-template-columns: 1fr 1fr;
                gap: 25px;
            }
        }

        .carte-plat {
            position: relative;
            background: var(--bg-card);
            color: var(--text-dark);
            padding: 22px;
            padding-bottom: 60px;
            border-radius: var(--radius);
            border-left: 5px solid #78828a;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            transition: var(--transition);
        }

        .carte-plat:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
        }

        .carte-plat.signature {
            border-left-color: var(--primary);
            background-color: #fffcf7;
            box-shadow: 0 10px 25px rgba(139, 69, 19, 0.15), 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .badge-chef {
            background: var(--primary);
            color: white;
            font-size: 10px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 4px;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .carte-plat h3 {
            font-family: 'Playfair Display', serif;
            margin: 0 0 6px 0;
            color: #1a1108;
            font-size: 1.3rem;
            line-height: 1.3;
        }

        .auteur {
            font-size: 0.85rem;
            color: var(--primary-light);
            font-weight: 600;
            margin-bottom: 16px;
        }

        .ingredients {
            font-size: 0.9rem;
            background: #f7f3eb;
            padding: 10px 14px;
            border-radius: 6px;
            margin-bottom: 14px;
            border: 1px dashed rgba(160, 82, 45, 0.3);
            color: #4a3319;
            word-break: break-word;
            line-height: 1.4;
        }

        .preparation {
            font-size: 0.92rem;
            line-height: 1.6;
            color: #444;
            word-break: break-word;
        }

        .action-bar {
            position: absolute;
            bottom: 18px;
            right: 22px;
            left: 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .date-publication {
            font-size: 0.75rem;
            color: #777;
            font-style: italic;
        }

        .btn-coeur {
            background: rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0,0,0,0.08);
            color: #555;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 30px;
            font-weight: 600;
            transition: var(--transition);
        }

        .btn-coeur:hover {
            background: rgba(188, 26, 26, 0.1);
            color: #bc1a1a;
            border-color: rgba(188, 26, 26, 0.2);
            transform: scale(1.05);
        }

        .btn-coeur.liked {
            background: #bc1a1a;
            border-color: #bc1a1a;
            color: white;
        }
        
        .btn-coeur.liked:hover {
            background: #a01414;
            color: white;
        }

        footer {
            text-align: center;
            margin-top: 50px;
            padding: 20px;
        }

        .btn-admin-trigger {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.8rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: var(--transition);
        }
        
        .btn-admin-trigger:hover {
            color: var(--accent);
        }

        .comptoir-chef {
            display: none;
            background: #1e140a;
            color: var(--text-light);
            border: 1px solid var(--accent);
            margin-top: 30px;
            padding: 25px;
            border-radius: var(--radius);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }
        
        .comptoir-chef h2 {
            font-family: 'Playfair Display', serif;
            color: var(--accent);
        }
        
        .comptoir-chef label {
            color: var(--accent);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <h1>SA<span class="logo-dot"></span>HAFA</h1>
        </div>
        <p>Izay tia mahandro...</p>
    </header>

    <div class="main-container">
        
        <section class="comptoir">
            <h2>Partager une idée</h2>
            <div class="form-group">
                <label for="pseudo">Votre Prénom / Pseudo</label>
                <input type="text" id="pseudo" placeholder="Ex: Rova">
            </div>
            <div class="form-group">
                <label for="nomPlat">Nom du plat</label>
                <input type="text" id="nomPlat" placeholder="Ex: Sambos revisités au canard">
            </div>
            <div class="form-group">
                <label for="ingredients">Ingrédients clés</label>
                <input type="text" id="ingredients" placeholder="Ex: Pâte à sambos, confit de canard, gingembre">
            </div>
            <div class="form-group">
                <label for="preparation">Votre secret de préparation</label>
                <textarea id="preparation" placeholder="Expliquez brièvement votre tour de main ou l'association..."></textarea>
            </div>
            <button onclick="ajouterPlat()">Déposer sur le Sahafa</button>
        </section>

        <section class="table-commune">
            <h2>La Table des Inspirations</h2>
            <div id="grille" class="grille-plats"></div>

            <div id="comptoirChef" class="comptoir-chef">
                <h2>🛠️ Tableau de Bord du Chef</h2>
                
                <button style="background-color: #27ae60; border-color: #27ae60; margin-bottom: 25px;" onclick="initialiserStructureGoogleSheets()">🔧 Réinitialiser la structure Google Sheets</button>
                
                <div class="form-group">
                    <label for="selectSignature">Choisir l'emplacement à modifier :</label>
                    <select id="selectSignature" onchange="chargerInfosDansFormulaireChef()">
                        <option value="sig_mousse">Suggestion n°1 (Mousse au Chocolat)</option>
                        <option value="sig_zebu">Suggestion n°2 (Filet de Zébu)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="chefNomPlat">Nouveau Nom du plat :</label>
                    <input type="text" id="chefNomPlat">
                </div>
                <div class="form-group">
                    <label for="chefIngredients">Nouveaux Ingrédients :</label>
                    <input type="text" id="chefIngredients">
                </div>
                <div class="form-group">
                    <label for="chefPreparation">Nouvelle Préparation :</label>
                    <textarea id="chefPreparation"></textarea>
                </div>
                <button style="background-color: #bc1a1a; border-color: #bc1a1a;" onclick="sauvegarderMiseAJourChef()">Mettre à jour la proposition</button>
            </div>
        </section>

    </div>

    <footer>
        <button class="btn-admin-trigger" onclick="ouvrirEspaceChef()">🛠️ Espace Chef</button>
    </footer>

    <script>
        const SHEETDB_API_URL = "https://sheetdb.io/api/v1/0rh3a0c2lchfa";
        let tousLesPlats = [];

        window.onload = function() {
            recupererPlatsDepuisGoogleSheets();
        };

        function extraireValeur(objet, cleAttendue) {
            if (!objet) return "";
            const cleFormatee = cleAttendue.toLowerCase().trim();
            for (let k in objet) {
                if (k.toLowerCase().trim() === cleFormatee) {
                    return String(objet[k]).trim();
                }
            }
            return "";
        }

        function recupererPlatsDepuisGoogleSheets() {
            const grille = document.getElementById('grille');
            grille.innerHTML = "<div style='color:var(--accent); padding:20px; font-style:italic;'>Mise de table en cours...</div>";

            fetch(SHEETDB_API_URL)
                .then(response => {
                    if (!response.ok) throw new Error("Erreur HTTP: " + response.status);
                    return response.json();
                })
                .then(data => {
                    if (data && Array.isArray(data) && data.length > 0 && !data[0].error) {
                        const donneesValides = data.filter(item => item && (extraireValeur(item, 'id') || extraireValeur(item, 'nomplat')));

                        tousLesPlats = donneesValides.map(item => {
                            return {
                                id: extraireValeur(item, 'id'),
                                pseudo: extraireValeur(item, 'pseudo') || "Anonyme",
                                nomplat: extraireValeur(item, 'nomplat') || extraireValeur(item, 'nom du plat'),
                                ingredients: extraireValeur(item, 'ingredients') || extraireValeur(item, 'ingrédients'),
                                preparation: extraireValeur(item, 'preparation') || extraireValeur(item, 'préparation'),
                                issignature: extraireValeur(item, 'issignature').toLowerCase(),
                                date: extraireValeur(item, 'date')
                            };
                        });
                    } else {
                        tousLesPlats = [];
                    }
                    afficherTousLesPlats();
                    chargerInfosDansFormulaireChef();
                })
                .catch(error => {
                    console.error("Erreur détectée:", error);
                    tousLesPlats = [];
                    afficherTousLesPlats();
                });
        }

        function afficherTousLesPlats() {
            const grille = document.getElementById('grille');
            grille.innerHTML = ""; 

            if(tousLesPlats.length === 0) {
                grille.innerHTML = "<div style='color:var(--accent); opacity:0.8; padding:35px; border: 1px dashed var(--accent); text-align:center; font-style: italic; border-radius:var(--radius);'>La table attend vos créations !<br><br>Soyez le premier à partager une idée culinaire.</div>";
                return;
            }

            const signatures = tousLesPlats.filter(p => p.id && (p.issignature === "true" || p.pseudo.toLowerCase() === "chef"));
            const visiteurs = tousLesPlats.filter(p => p.id && p.issignature !== "true" && p.pseudo.toLowerCase() !== "chef").reverse();

            signatures.forEach(plat => grille.appendChild(creerCarteHTML(plat, true)));
            visiteurs.forEach(plat => grille.appendChild(creerCarteHTML(plat, false)));
        }

        function creerCarteHTML(plat, isSignature) {
            const carte = document.createElement('div');
            carte.className = `carte-plat ${isSignature ? 'signature' : ''}`;
            
            const likesLocaux = parseInt(localStorage.getItem('like_' + plat.id)) || 0;
            const hasLiked = localStorage.getItem('user_has_liked_' + plat.id) === 'true';

            const securePseudo = (plat.pseudo || 'Anonyme').replace(/</g, "&lt;").replace(/>/g, "&gt;");
            const secureNomPlat = (plat.nomplat || 'Plat sans nom').replace(/</g, "&lt;").replace(/>/g, "&gt;");
            const secureIngredients = (plat.ingredients || '-').replace(/</g, "&lt;").replace(/>/g, "&gt;");
            const securePreparation = (plat.preparation || '-').replace(/</g, "&lt;").replace(/>/g, "&gt;");
            const secureDate = plat.date ? plat.date.replace(/</g, "&lt;").replace(/>/g, "&gt;") : '';

            carte.innerHTML = `
                ${isSignature ? '<span class="badge-chef">Suggestion du Chef</span>' : ''}
                <h3>${secureNomPlat}</h3>
                <div class="auteur">Par ${securePseudo}</div>
                <div class="ingredients"><strong>Ingrédients :</strong> ${secureIngredients}</div>
                <div class="preparation">${securePreparation}</div>
                <div class="action-bar">
                    <div class="date-publication">${secureDate}</div>
                    <button class="btn-coeur ${hasLiked ? 'liked' : ''}" onclick="likerPlat('${plat.id}')">
                        ❤️ <span>${likesLocaux}</span>
                    </button>
                </div>
            `;
            return carte;
        }

        function ajouterPlat() {
            const pseudo = document.getElementById('pseudo').value.trim();
            const nomPlat = document.getElementById('nomPlat').value.trim();
            const ingredients = document.getElementById('ingredients').value.trim();
            const preparation = document.getElementById('preparation').value.trim();

            if (!pseudo || !nomPlat || !ingredients || !preparation) {
                alert("S'il vous plaît, remplissez toutes les cases !");
                return;
            }

            const maintenant = new Date();
            const optionDate = { day: '2-digit', month: '2-digit', year: 'numeric' };
            const optionHeure = { hour: '2-digit', minute: '2-digit' };
            const dateFormatee = maintenant.toLocaleDateString('fr-FR', optionDate) + " à " + maintenant.toLocaleTimeString('fr-FR', optionHeure);

            const nouveauPlat = {
                id: "plat_" + Date.now(),
                pseudo: pseudo,
                nomplat: nomPlat,
                ingredients: ingredients,
                preparation: preparation,
                issignature: "false",
                date: dateFormatee
            };

            fetch(SHEETDB_API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data: [nouveauPlat] })
            })
            .then(response => response.json())
            .then(result => {
                recupererPlatsDepuisGoogleSheets();
                document.getElementById('pseudo').value = "";
                document.getElementById('nomPlat').value = "";
                document.getElementById('ingredients').value = "";
                document.getElementById('preparation').value = "";
            })
            .catch(error => alert("Erreur d'envoi. Veuillez vérifier votre connexion."));
        }

        function initialiserStructureGoogleSheets() {
            if(!confirm("Attention : l'initialisation va synchroniser la base. Continuer ?")) return;

            const baseDonneesInitiale = [
                { id: "sig_mousse", pseudo: "Chef", nomplat: "Mousse au Chocolat", ingredients: "Chocolat noir, Oeufs", preparation: "Monter les blancs en neige fermes.", issignature: "true", date: "" },
                { id: "sig_zebu", pseudo: "Chef", nomplat: "Filet de Zébu aux Baies Roses", ingredients: "Zébu, Baies roses, Crème", preparation: "Saisir à la poêle et lier la sauce.", issignature: "true", date: "" }
            ];

            fetch(SHEETDB_API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data: baseDonneesInitiale })
            })
            .then(res => res.json())
            .then(result => {
                alert("Structure initialisée avec succès !");
                recupererPlatsDepuisGoogleSheets();
            })
            .catch(err => alert("Erreur d'initialisation."));
        }

        function sauvegarderMiseAJourChef() {
            const idSelectionne = document.getElementById('selectSignature').value;
            const nomPlatModifie = document.getElementById('chefNomPlat').value.trim();
            const ingredientsModifies = document.getElementById('chefIngredients').value.trim();
            const preparationModifiee = document.getElementById('chefPreparation').value.trim();

            if (!nomPlatModifie || !ingredientsModifies || !preparationModifiee) {
                alert("Veuillez remplir tous les champs.");
                return;
            }

            const platChefMisAJour = {
                nomplat: nomPlatModifie,
                ingredients: ingredientsModifies,
                preparation: preparationModifiee,
                pseudo: "Chef",
                issignature: "true",
                date: ""
            };

            fetch(`${SHEETDB_API_URL}/id/${idSelectionne}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data: platChefMisAJour })
            })
            .then(response => {
                if (!response.ok) throw new Error("PUT non supporté, bascule sur le plan B");
                return response.json();
            })
            .then(result => {
                actionsSuccesChef(idSelectionne);
            })
            .catch(error => {
                console.log("Tentative de mise à jour via ajout direct (Plan B)...");
                platChefMisAJour.id = idSelectionne;
                
                fetch(SHEETDB_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: [platChefMisAJour] })
                })
                .then(res => res.json())
                .then(() => {
                    actionsSuccesChef(idSelectionne);
                })
                .catch(err => alert("Erreur critique : SheetDB refuse la modification complète."));
            });
        }

        function actionsSuccesChef(idSelectionne) {
            localStorage.removeItem('user_has_liked_' + idSelectionne);
            localStorage.setItem('like_' + idSelectionne, 0);
            document.getElementById('comptoirChef').style.display = "none";
            window.scrollTo({ top: 0, behavior: 'smooth' });
            alert("Suggestion du Chef mise à jour avec succès !");
            recupererPlatsDepuisGoogleSheets();
        }

        function likerPlat(id) {
            let nbLikes = parseInt(localStorage.getItem('like_' + id)) || 0;
            const hasLikedKey = 'user_has_liked_' + id;
            const hasLiked = localStorage.getItem(hasLikedKey) === 'true';

            if (!hasLiked) {
                nbLikes++;
                localStorage.setItem(hasLikedKey, 'true');
            } else {
                nbLikes = Math.max(0, nbLikes - 1); 
                localStorage.removeItem(hasLikedKey);
            }
            localStorage.setItem('like_' + id, nbLikes);
            afficherTousLesPlats();
        }

        function ouvrirEspaceChef() {
            const password = prompt("Entrez le code secret du Chef Sahafa :");
            if (password === "Hasina2021") {
                document.getElementById('comptoirChef').style.display = "block";
                document.getElementById('comptoirChef').scrollIntoView({ behavior: 'smooth' });
                chargerInfosDansFormulaireChef();
            } else if (password !== null) {
                alert("Code erroné.");
            }
        }

        function chargerInfosDansFormulaireChef() {
            const idSelectionne = document.getElementById('selectSignature').value;
            if(!tousLesPlats || tousLesPlats.length === 0) return;
            const plat = tousLesPlats.find(p => p.id === idSelectionne);
            
            if(plat) {
                document.getElementById('chefNomPlat').value = plat.nomplat || "";
                document.getElementById('chefIngredients').value = plat.ingredients || "";
                document.getElementById('chefPreparation').value = plat.preparation || "";
            } else {
                document.getElementById('chefNomPlat').value = "";
                document.getElementById('chefIngredients').value = "";
                document.getElementById('chefPreparation').value = "";
            }
        }
    </script>
